<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Measurement Result</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#f4f6fb;

}

.container{

max-width:1200px;
margin:40px auto;

}

.header{

text-align:center;
margin-bottom:30px;

}

.header h1{

font-size:38px;

}

.card{

display:flex;
gap:30px;
flex-wrap:wrap;

}

.left{

flex:2;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);

}

.left img{

width:100%;
border-radius:10px;

}

.right{

flex:1;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);

}

.measure{

margin-bottom:25px;
padding:20px;
border-radius:10px;
background:#f7f9ff;

}

.measure h3{

color:#1e88e5;
margin-bottom:8px;

}

.measure p{

font-size:30px;
font-weight:bold;

}

.buttons{

margin-top:35px;
display:flex;
flex-direction:column;
gap:15px;

}

.btn{

display:block;
text-align:center;
padding:15px;
background:#1e88e5;
color:white;
text-decoration:none;
border-radius:10px;
font-size:18px;

}

.btn:hover{

background:#1565c0;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Measurement Result</h1>

</div>

<div class="card">

<div class="left">

<img src="{{ result.image }}" alt="Result">

</div>

<div class="right">

<div class="measure">

<h3>Height</h3>

<p>{{ result.height }} cm</p>

</div>

<div class="measure">

<h3>Shoulder Width</h3>

<p>{{ result.shoulder }} cm</p>

</div>

<div class="measure">

<h3>Waist Circumference</h3>

<p>{{ result.waist }} cm</p>

</div>

<div class="buttons">

<a href="/" class="btn">

Measure Another Image

</a>

</div>

</div>

</div>

</div>

</body>

</html>
